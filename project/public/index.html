<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Inventuurisüsteem</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header>
    <h1>Inventuurisüsteem</h1>
</header>

<main>

<section class="login">
    <h2>Sisselogimine</h2>
    <form action="/login" method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="Email" required>

        <label>Parool</label>
        <input type="password" name="password" placeholder="Parool" required>

        <button type="submit">Logi sisse</button>
    </form>
</section>

<section class="devices">
    <h2>Seadmete nimekiri</h2>

    <table>
        <thead>
            <tr>
                <th>Nimi</th>
                <th>Seerianumber</th>
                <th>Staatus</th>
                <th>Seisukord</th>
                <th>Tegevus</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Sülearvuti</td>
                <td>ABC123</td>
                <td>Kasutuses</td>
                <td>Hea</td>
                <td>
                    <button type="button" class="use">Kasuta</button>
                    <button type="button" class="delete">Kustuta</button>
                </td>
            </tr>

            <tr>
                <td>Monitor</td>
                <td>XYZ789</td>
                <td>Vaba</td>
                <td>Rahuldav</td>
                <td>
                    <button type="button" class="use">Kasuta</button>
                    <button type="button" class="delete">Kustuta</button>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="add-device">
        <h3>Lisa uus seade (Admin)</h3>
        <form action="/devices" method="POST">
            <input type="text" name="name" placeholder="Nimi" required>
            <input type="text" name="serial" placeholder="Seerianumber" required>
            <input type="date" name="date" required>
            <button type="submit">Lisa</button>
        </form>
    </div>

</section>

</main>

<script src="app/server.js"></script>
</body>
</html>
