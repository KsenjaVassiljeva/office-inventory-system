<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Logi sisse</title>
    <link rel="stylesheet" href="styles.css">
    <script src="login.js" defer></script>
</head>
<body>
 
<section class="login">
    <h2>Sisselogimine</h2>

    <p>Ei ole kontot? <a href="register.html">Registreeri siit</a></p>
</section>
 
</body>
</html>
