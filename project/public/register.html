<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <title>Registreeri</title>
    <link rel="stylesheet" href="styles.css">
    <script src="register.js" defer></script>
</head>
<body>
 
<section class="register-page">
    <h2>Registreerimine</h2>
 
    <div id="error-msg" style="color:red; display:none;"></div>
 
    <label>Email</label>
    <input type="email" id="email" placeholder="Email" required>
    <label>Parool</label>
    <input type="password" id="password" placeholder="Parool" required>
    <label>Korda parooli</label>
    <input type="password" id="passwordConfirm" placeholder="Korda parooli" required>
    <button id="register-btn">Registreeri</button>
 
    <p>On juba konto? <a href="login.html">Logi sisse</a></p>
</section>
 
</body>
</html>
